name: Release

# Trigger: push of a tag matching v1.2.3 (semver). No other path produces a
# release APK — drive-by master pushes go through CI only if you also tag.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Compute version from tag
        id: version
        run: |
          # Tag format: v<major>.<minor>.<patch>
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NAME="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<<"$VERSION_NAME"
          # versionCode = MAJOR*10000 + MINOR*100 + PATCH (e.g., 1.2.3 -> 10203).
          # Strictly increasing as long as MINOR<100 and PATCH<100.
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "name=$VERSION_NAME"   >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "Building $TAG → versionName=$VERSION_NAME, versionCode=$VERSION_CODE"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/olyapmiz-release.jks
          ls -la keystore/

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=keystore/olyapmiz-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease \
            -PappVersionCode=${{ steps.version.outputs.code }} \
            -PappVersionName=${{ steps.version.outputs.name }} \
            --stacktrace

      - name: Rename APK
        run: |
          # Produce both a stable name (olyapmiz.apk) so that
          # /releases/latest/download/olyapmiz.apk is a permanent direct
          # download link, AND a versioned copy for archival/historical
          # reference inside each release.
          cp app/build/outputs/apk/release/app-release.apk olyapmiz.apk
          cp app/build/outputs/apk/release/app-release.apk olyapmiz-${{ steps.version.outputs.name }}.apk
          ls -la olyapmiz*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: O'lyapmiz ${{ steps.version.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            olyapmiz.apk
            olyapmiz-${{ steps.version.outputs.name }}.apk
